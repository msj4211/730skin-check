  * { box-sizing: border-box; }

    border: 1px solid #DDD5C7; background: #FBF8F2; color: #8A8378;

  .opt-btn:hover { background: #F0E9DA; }
  .opt-btn.active {

  }

  }
  .calc-btn:active { transform: scale(0.99); }
